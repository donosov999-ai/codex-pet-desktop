<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>宠物·永生计划</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #17202a;
        background: #f4f7fb;
      }
      body {
        margin: 0;
      }
      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        letter-spacing: 0;
      }
      h2 {
        margin: 0 0 10px;
        font-size: 21px;
        letter-spacing: 0;
      }
      p {
        color: #526171;
        line-height: 1.7;
      }
      .downloads {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
        margin-top: 24px;
      }
      .section {
        margin-top: 34px;
      }
      .download {
        padding: 20px;
        border: 1px solid #dce3ec;
        border-radius: 8px;
        background: #ffffff;
      }
      .download h3 {
        margin: 0 0 8px;
        font-size: 18px;
        letter-spacing: 0;
      }
      .download a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        margin-top: 10px;
        margin-right: 8px;
        padding: 0 14px;
        color: #ffffff;
        background: #1f7a55;
        border-radius: 6px;
        text-decoration: none;
      }
      code {
        padding: 2px 5px;
        border-radius: 4px;
        background: #e8eef6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color: #eef3f8;
          background: #12161c;
        }
        p {
          color: #aeb9c6;
        }
        .download {
          border-color: #2b3542;
          background: #1a2028;
        }
        code {
          background: #252d38;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>宠物·永生计划</h1>
      <p>先安装主程序，再下载宠物资源包。主程序更新和宠物资源更新彼此独立。</p>

      <section class="section" aria-label="App downloads">
        <h2>主程序</h2>
        <div class="downloads">
          <article class="download">
            <h3>Windows</h3>
            <p>适合 Windows x64。</p>
            <a href="https://github.com/jieyangxchen/codex-pet-desktop/releases/latest/download/yongsheng-plan-windows-x64.exe">下载 Windows 版</a>
          </article>
          <article class="download">
            <h3>macOS</h3>
            <p>根据 Mac 芯片选择 Apple Silicon 或 Intel。</p>
            <a href="https://github.com/jieyangxchen/codex-pet-desktop/releases/latest/download/yongsheng-plan-macos-arm64.dmg">Apple Silicon</a>
            <a href="https://github.com/jieyangxchen/codex-pet-desktop/releases/latest/download/yongsheng-plan-macos-x64.dmg">Intel</a>
          </article>
        </div>
      </section>

      <section class="section" aria-label="Petpacks">
        <h2>宠物资源包</h2>
        <p>下载 <code>.petpack</code> 后，在主程序里点击 Import Petpack 导入。</p>
        <div class="downloads">
          <article class="download">
            <h3>米粉</h3>
            <p>全白猫咪，常态趴着待机。</p>
            <a href="./petpacks/mi-fen-1.0.1.petpack">下载米粉</a>
          </article>
          <article class="download">
            <h3>米酒</h3>
            <p>深色长毛虎斑猫，常态趴着待机。</p>
            <a href="./petpacks/mi-jiu-1.0.0.petpack">下载米酒</a>
          </article>
          <article class="download">
            <h3>红糖</h3>
            <p>虎斑色惠比特桌宠。</p>
            <a href="./petpacks/tigris-whippet-1.0.1.petpack">下载红糖</a>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
