<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бирюзик</title>
    <link rel="stylesheet" href="./renderer.css" />
  </head>
  <body>
    <main id="stage" aria-label="Бирюзик">
      <div id="pet" role="img" aria-label="Бирюзик"></div>
      <section id="emptyState" class="empty-state hidden" aria-label="Добавление питомца">
        <strong>Питомец не найден</strong>
        <span>Импортируйте пакет питомца или установите его из каталога.</span>
        <button id="openStoreEmptyButton" type="button">Открыть каталог</button>
        <button id="importEmptyButton" type="button">Импортировать пакет</button>
      </section>
      <div id="panelBackdrop" class="panel-backdrop hidden" aria-hidden="true"></div>
      <section id="panel" class="panel hidden" aria-label="Управление питомцем">
        <div class="panel-topbar">
          <nav class="panel-tabs" aria-label="Разделы управления">
            <button id="tabControl" class="active" type="button" data-panel-tab="controlSection">Управление</button>
            <button id="tabStore" type="button" data-panel-tab="storeSection">Каталог</button>
            <button id="tabManager" type="button" data-panel-tab="managerSection">Питомцы</button>
            <button id="tabUpdate" type="button" data-panel-tab="updateSection">Обновления</button>
          </nav>
          <button id="closePanelButton" class="panel-close" type="button" aria-label="Закрыть панель" title="Закрыть">×</button>
        </div>
        <section id="controlSection" class="panel-section" aria-label="Основные настройки">
          <div class="panel-row">
            <label for="petSelect">Питомец</label>
            <select id="petSelect"></select>
          </div>
          <div class="panel-row">
            <label for="stateSelect">Действие</label>
            <select id="stateSelect"></select>
          </div>
          <section id="careControls" class="care-controls hidden" aria-label="Уход за питомцем">
            <span class="row-label">Уход</span>
            <div id="careActions" class="care-actions"></div>
          </section>
          <div class="panel-row">
            <label for="scaleRange">Размер</label>
            <input id="scaleRange" type="range" min="0.6" max="1.8" step="0.1" value="0.9" />
          </div>
          <div class="panel-row">
            <span class="row-label">Направление</span>
            <div class="direction-control" role="group" aria-label="Направление питомца">
              <button id="directionLeftButton" type="button" data-pet-direction="left">Влево</button>
              <button id="directionRightButton" type="button" data-pet-direction="right">Вправо</button>
            </div>
          </div>
          <label class="check-row">
            <input id="wanderToggle" type="checkbox" checked />
            <span>Гулять по экрану</span>
          </label>
          <label class="check-row">
            <input id="naturalLifeToggle" type="checkbox" checked />
            <span>Самостоятельные действия</span>
          </label>
          <label class="check-row">
            <input id="topToggle" type="checkbox" checked />
            <span>Поверх остальных окон</span>
          </label>
          <button id="importButton" type="button">Импортировать пакет питомца</button>
          <section id="importPreview" class="import-preview hidden" aria-label="Предпросмотр импорта">
            <p id="importPreviewText"></p>
            <div class="import-preview-actions">
              <button id="confirmImportButton" type="button">Импортировать</button>
              <button id="cancelImportButton" type="button">Отмена</button>
            </div>
          </section>
          <p id="petStatus" class="pet-status" aria-live="polite"></p>
          <button id="quitButton" type="button">Закрыть Бирюзика</button>
        </section>
        <section id="storeSection" class="panel-section hidden" aria-label="Каталог питомцев">
          <div class="panel-heading">Каталог питомцев</div>
          <input id="storeSearch" type="search" placeholder="Найти питомца" aria-label="Поиск питомца" />
          <select id="storeFilter" aria-label="Фильтр каталога">
            <option value="all">Все питомцы</option>
            <option value="updates">Есть обновления</option>
            <option value="uninstalled">Не установлены</option>
            <option value="installed">Установлены</option>
          </select>
          <select id="storeTagFilter" aria-label="Категория каталога">
            <option value="all">Все категории</option>
          </select>
          <button id="refreshStoreButton" type="button">Обновить каталог</button>
          <button id="updateAllPetpacksButton" type="button">Обновить всех питомцев</button>
          <p id="petStoreStatus" class="store-status" aria-live="polite"></p>
          <progress id="petStoreProgress" class="store-progress hidden" max="1" value="0" aria-label="Ход установки"></progress>
          <div id="petStoreList" class="pet-store-list"></div>
        </section>
        <section id="managerSection" class="panel-section hidden pet-manager" aria-label="Установленные питомцы">
          <div class="panel-heading">Установленные питомцы</div>
          <div id="petManager" class="pet-manager-list"></div>
        </section>
        <section id="updateSection" class="panel-section hidden app-update" aria-label="Обновления">
          <div class="panel-heading">Обновления</div>
          <div class="app-update-actions">
            <button id="checkUpdateButton" type="button">Проверить приложение</button>
            <button id="checkPetpackUpdatesButton" type="button">Проверить питомцев</button>
            <button id="openDownloadsButton" type="button">Открыть загрузки</button>
            <button id="openStoreButton" type="button">Открыть каталог</button>
          </div>
          <p id="updateStatus" class="update-status" aria-live="polite"></p>
          <progress id="appUpdateProgress" class="store-progress hidden" max="1" value="0" aria-label="Загрузка обновления"></progress>
        </section>
      </section>
      <input id="petpackInput" class="petpack-input" type="file" accept=".petpack,application/zip" aria-label="Выбрать пакет питомца" />
    </main>
    <script type="module" src="./renderer/index.js"></script>
  </body>
</html>
