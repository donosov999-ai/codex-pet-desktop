name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri.exe
            src-tauri/target
          key: cargo-windows-app-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-windows-app-
            cargo-windows-

      - name: Install Tauri CLI
        shell: pwsh
        run: |
          if (Get-Command cargo-tauri -ErrorAction SilentlyContinue) {
            cargo tauri --version
          } else {
            cargo install tauri-cli --version "^2"
          }

      - name: Build app
        run: node scripts/build-app.js build windows

      - name: Rename installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets
          Get-ChildItem src-tauri\target\release\bundle\nsis\*.exe | ForEach-Object {
            Copy-Item $_.FullName "release-assets\yongsheng-plan-windows-x64.exe"
          }

      - uses: actions/upload-artifact@v7
        with:
          name: yongsheng-plan-windows-x64
          path: release-assets/*.exe

  build-macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri
            src-tauri/target/${{ matrix.target }}
          key: cargo-macos-app-${{ matrix.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-macos-app-${{ matrix.arch }}-
            cargo-macos-

      - name: Install Tauri CLI
        run: |
          if command -v cargo-tauri >/dev/null 2>&1; then
            cargo tauri --version
          else
            cargo install tauri-cli --version "^2"
          fi

      - name: Build app
        run: node scripts/build-app.js build macos-${{ matrix.arch }}

      - name: Rename installer
        run: |
          mkdir -p release-assets
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg "release-assets/yongsheng-plan-macos-${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v7
        with:
          name: yongsheng-plan-macos-${{ matrix.arch }}
          path: release-assets/*.dmg

  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/*.exe
            release-assets/*.dmg
          body: |
            先下载永生计划主程序，再从 GitHub Pages 宠物包页面下载并导入宠物。

            - `yongsheng-plan-windows-x64.exe`: Windows x64 主程序
            - `yongsheng-plan-macos-arm64.dmg`: Apple Silicon Mac 主程序
            - `yongsheng-plan-macos-x64.dmg`: Intel Mac 主程序
